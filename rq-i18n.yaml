# rq plugin - translations. Drop at ~/.hermes/rq-i18n.yaml
#
# Active language = config.yaml `language` (same setting the WebUI exposes)
#   -> fallback rq-targets.yaml `defaults.lang` -> "en".
# English is built into the plugin; any missing key falls back to English
# (per key), and "zh-Hant" falls back to "zh". Same model as the WebUI.
#
# WebUI language codes to provision (14): en fr es de it pt ru pl tr vi ja ko zh zh-Hant
#   filled below: fr es de it pt  (reliable)
#   TODO (fall back to English until translated - native review recommended):
#         ru pl tr vi ja ko zh zh-Hant
#   To add one: copy the `fr:` block, change the code, translate the values.
#   Keep %s / %d placeholders and the /rq command tokens unchanged.

fr:
  help: |-
    rq - routeur de requêtes HTTP et de commandes système (un ou plusieurs paramètres).

    Usage : /rq <cible> : <payload>
      /rq list                        - liste les cibles
      /rq show <cible>                - affiche une cible
      /rq add <nom> <GET|POST> <url> [p1 p2 …]   - ajoute une cible HTTP
      /rq del <cible>                 - supprime une cible
      /rq help                        - cette aide
    Exemples : /rq kb : hôte de prod   |   /rq weather : Paris | 3
  expect_one: "cette cible attend 1 paramètre : %s"
  missing: "paramètre(s) manquant(s) : %s (attendus : %s)"
  yaml_unavailable: "PyYAML indisponible dans le runtime."
  unreadable: "rq-targets.yaml illisible : %s"
  net_error: "erreur réseau : %s"
  url_invalid: "URL de cible invalide."
  host_denied: "hôte refusé par la politique : %s"
  blocked_linklocal: "adresse link-local/métadonnées bloquée (%s)."
  blocked_private: "adresse privée/loopback bloquée (%s)."
  redirect_blocked: "redirection bloquée (HTTP %s) - mettre follow_redirects: true pour l'autoriser."
  exec_disabled: "exec désactivé - mettre 'allow_exec: true' dans rq-targets.yaml."
  exec_invalid: "cible exec invalide : 'cmd' doit être une liste (argv), ex. [\"df\",\"-h\",\"{path}\"]."
  cmd_timeout: "commande expirée (%ss)."
  cmd_notfound: "commande introuvable : %s"
  exec_error: "erreur exec : %s"
  no_output: "(pas de sortie, code %s)"
  truncated: "\n… [tronqué à %d caractères]"
  no_targets: "aucune cible. Ajoute : /rq add <nom> <GET|POST> <url> [params]"
  targets_header: "Cibles :"
  usage_show: "Usage : /rq show <cible>"
  unknown_target_mgmt: "cible inconnue : %s"
  usage_add: "Usage : /rq add <nom> <GET|POST> <url> [p1 p2 …]  (HTTP uniquement)"
  method_invalid: "method doit être GET ou POST."
  target_added: "cible '%s' ajoutée (HTTP %s, params : %s)."
  write_failed: "échec d'écriture : %s"
  usage_del: "Usage : /rq del <cible>"
  target_removed: "cible '%s' supprimée."
  unknown_target: "cible inconnue : '%s'. Disponibles : %s"

